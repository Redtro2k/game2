<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Love Minesweeper</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff7d7;
      color: #2f2418;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      background:
        radial-gradient(circle at 16% 15%, rgba(255, 218, 102, 0.58), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(255, 156, 184, 0.3), transparent 30%),
        radial-gradient(circle at 50% 92%, rgba(255, 235, 153, 0.48), transparent 34%),
        linear-gradient(135deg, #fffdf1 0%, #fff2c2 52%, #ffe9ef 100%);
    }

    main {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      color: #7a4b16;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #6b5338;
      line-height: 1.5;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    a,
    button {
      min-height: 44px;
      border: 2px solid #7a4b16;
      border-radius: 6px;
      padding: 0 16px;
      display: inline-grid;
      place-items: center;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      background: #fffdf5;
      color: #7a4b16;
      cursor: pointer;
    }

    button:hover,
    a:hover {
      background: #fff1b8;
    }

    .restart {
      background: #ffd84d;
      color: #2f2418;
    }

    .restart:hover {
      background: #ffe27a;
    }

    #next-stage:not([hidden]) {
      display: inline-grid;
      margin-top: 14px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 102px;
      border: 2px solid #7a4b16;
      border-radius: 8px;
      background: rgba(255, 253, 243, 0.95);
      padding: 10px 12px;
      box-shadow: 4px 4px 0 #7a4b16;
    }

    .stat span {
      display: block;
      color: #8a6841;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 1.35rem;
    }

    .panel {
      border: 2px solid #7a4b16;
      border-radius: 8px;
      background: rgba(255, 253, 243, 0.94);
      padding: 22px;
      box-shadow: 8px 8px 0 #7a4b16;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(54px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .tile {
      width: 100%;
      aspect-ratio: 1;
      min-height: 0;
      border: 2px solid #7a4b16;
      border-radius: 8px;
      padding: 6px;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 138, 170, 0.42) 0 15%, transparent 16%),
        linear-gradient(135deg, #ffd84d, #fff1b8);
      color: #7a4b16;
      font-size: clamp(1.2rem, 5vw, 2rem);
      line-height: 1.05;
      box-shadow: 4px 4px 0 #7a4b16;
      transition: transform 130ms ease, background 130ms ease;
    }

    .tile:hover {
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 138, 170, 0.48) 0 15%, transparent 16%),
        linear-gradient(135deg, #ffe27a, #fff7d7);
      transform: translate(-1px, -1px);
    }

    .tile:disabled {
      cursor: default;
      transform: none;
      opacity: 1;
    }

    .tile.revealed {
      background: #fffdf5;
      box-shadow: 2px 2px 0 #7a4b16;
    }

    .tile.bad {
      background: #ffe1e8;
      color: #b45a72;
    }

    .tile.message-tile {
      font-size: clamp(0.72rem, 2.3vw, 0.95rem);
      padding: 8px;
      overflow-wrap: anywhere;
    }

    #message {
      min-height: 56px;
      border: 2px solid #7a4b16;
      border-radius: 6px;
      padding: 13px 14px;
      background: #fff1b8;
      color: #6a3c16;
      font-weight: 700;
      line-height: 1.35;
    }

    @media (max-width: 640px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .stats {
        justify-content: stretch;
      }

      .stat {
        flex: 1;
      }

      .panel {
        padding: 18px;
        box-shadow: 5px 5px 0 #7a4b16;
      }

      .board {
        grid-template-columns: repeat(4, minmax(54px, 1fr));
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Stage 3: Love Minesweeper</h1>
        <p>Click the tiles, collect sweet clues, and avoid the broken hearts.</p>
      </div>
      <div class="stats" aria-label="Game stats">
        <div class="stat">
          <span>Safe</span>
          <strong id="safe-count">0/20</strong>
        </div>
        <div class="stat">
          <span>Danger</span>
          <strong>5</strong>
        </div>
      </div>
    </header>

    <nav class="nav" aria-label="Game navigation">
      <a href="index.html">Number Game</a>
      <a href="scrambled.html">Previous Stage</a>
      <button class="restart" id="restart" type="button">Restart</button>
    </nav>

    <section class="panel">
      <div id="message" role="status" aria-live="polite">Find the safe memories. Avoid the broken heart tiles.</div>
      <a id="next-stage" href="wordle.html" hidden>Next Stage: Wordle Love Edition</a>
      <div class="board" id="board" aria-label="Love Minesweeper board"></div>
    </section>
  </main>

  <script>
    const board = document.querySelector("#board");
    const message = document.querySelector("#message");
    const safeCount = document.querySelector("#safe-count");
    const restart = document.querySelector("#restart");
    const nextStage = document.querySelector("#next-stage");

    const size = 25;
    const badTileCount = 5;
    const safeTileCount = size - badTileCount;
    const safeMessages = [
      "You make ordinary days feel golden.",
      "Your smile is my favorite clue.",
      "A little memory, still glowing.",
      "This path feels warm.",
      "Safe place found.",
      "A soft moment saved.",
      "Good memory unlocked.",
      "You found a sweet sign."
    ];

    let tiles = [];
    let revealedSafeTiles = 0;
    let gameOver = false;

    function shuffle(items) {
      const shuffled = [...items];

      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
      }

      return shuffled;
    }

    function countNearbyBadTiles(index, badIndexes) {
      const row = Math.floor(index / 5);
      const column = index % 5;
      let count = 0;

      for (let rowOffset = -1; rowOffset <= 1; rowOffset += 1) {
        for (let columnOffset = -1; columnOffset <= 1; columnOffset += 1) {
          if (rowOffset === 0 && columnOffset === 0) {
            continue;
          }

          const nextRow = row + rowOffset;
          const nextColumn = column + columnOffset;

          if (nextRow < 0 || nextRow > 4 || nextColumn < 0 || nextColumn > 4) {
            continue;
          }

          if (badIndexes.has(nextRow * 5 + nextColumn)) {
            count += 1;
          }
        }
      }

      return count;
    }

    function createTiles() {
      const badIndexes = new Set(shuffle([...Array(size).keys()]).slice(0, badTileCount));

      return [...Array(size).keys()].map((index) => {
        const isBad = badIndexes.has(index);
        const nearbyBadTiles = countNearbyBadTiles(index, badIndexes);

        return {
          index,
          isBad,
          nearbyBadTiles,
          message: safeMessages[index % safeMessages.length],
          revealed: false
        };
      });
    }

    function tileContent(tile) {
      if (tile.isBad) {
        return "&#128148;";
      }

      if (tile.nearbyBadTiles > 0) {
        return tile.nearbyBadTiles;
      }

      if (tile.index % 3 === 0) {
        return tile.message;
      }

      return "&#9829;";
    }

    function revealTile(button, tile) {
      if (gameOver || tile.revealed) {
        return;
      }

      tile.revealed = true;
      button.disabled = true;
      button.classList.add("revealed");
      button.innerHTML = tileContent(tile);

      if (tile.isBad) {
        gameOver = true;
        button.classList.add("bad");
        revealAllBadTiles();
        message.textContent = "You found a broken heart. Try again and choose a softer path.";
        return;
      }

      revealedSafeTiles += 1;
      safeCount.textContent = `${revealedSafeTiles}/${safeTileCount}`;

      if (!tile.nearbyBadTiles && tile.index % 3 === 0) {
        button.classList.add("message-tile");
        message.textContent = tile.message;
      } else if (tile.nearbyBadTiles > 0) {
        message.textContent = `${tile.nearbyBadTiles} broken heart nearby. Choose carefully.`;
      } else {
        message.textContent = "Safe tile. Keep going.";
      }

      if (revealedSafeTiles === safeTileCount) {
        gameOver = true;
        disableBoard();
        message.textContent = "You avoided all the wrong paths. Now you unlocked my heart.";
        nextStage.hidden = false;
      }
    }

    function revealAllBadTiles() {
      [...board.children].forEach((button, index) => {
        const tile = tiles[index];
        button.disabled = true;

        if (tile.isBad) {
          button.classList.add("revealed", "bad");
          button.innerHTML = "&#128148;";
        }
      });
    }

    function disableBoard() {
      [...board.children].forEach((button) => {
        button.disabled = true;
      });
    }

    function renderBoard() {
      board.innerHTML = "";

      tiles.forEach((tile) => {
        const button = document.createElement("button");
        button.className = "tile";
        button.type = "button";
        button.setAttribute("aria-label", "Hidden tile");
        button.textContent = "?";
        button.addEventListener("click", () => revealTile(button, tile));
        board.appendChild(button);
      });
    }

    function startGame() {
      tiles = createTiles();
      revealedSafeTiles = 0;
      gameOver = false;
      safeCount.textContent = `0/${safeTileCount}`;
      message.textContent = "Find the safe memories. Avoid the broken heart tiles.";
      nextStage.hidden = true;
      renderBoard();
    }

    restart.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
