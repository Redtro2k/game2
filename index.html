<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One Shot Number Generator</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff7d7;
      color: #2f2418;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 218, 102, 0.55), transparent 27%),
        radial-gradient(circle at 82% 12%, rgba(255, 156, 184, 0.3), transparent 30%),
        radial-gradient(circle at 50% 92%, rgba(255, 235, 153, 0.48), transparent 34%),
        linear-gradient(135deg, #fffdf1 0%, #fff2c2 50%, #ffe9ef 100%);
    }

    main {
      width: min(100%, 480px);
      border: 2px solid #7a4b16;
      border-radius: 8px;
      background: rgba(255, 253, 243, 0.94);
      padding: 28px;
      box-shadow: 8px 8px 0 #7a4b16;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1;
      letter-spacing: 0;
      color: #7a4b16;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .target-mark {
      width: 76px;
      height: 76px;
      flex: 0 0 auto;
    }

    p {
      margin: 0 0 20px;
      color: #6b5338;
      line-height: 1.5;
    }

    button {
      min-height: 48px;
      border: 2px solid #7a4b16;
      border-radius: 6px;
      padding: 0 18px;
      font: inherit;
      font-weight: 700;
      background: #ffd84d;
      color: #2f2418;
      cursor: pointer;
    }

    button:hover {
      background: #ffe27a;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .number-display {
      display: grid;
      place-items: center;
      min-height: 140px;
      margin: 22px 0 18px;
      border: 2px solid #7a4b16;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 244, 188, 0.92)),
        #ffffff;
      color: #b45a72;
      font-size: clamp(3.5rem, 22vw, 7rem);
      font-weight: 900;
      line-height: 1;
    }

    .generate-button {
      width: 100%;
      font-size: 1.1rem;
    }

    #result {
      min-height: 54px;
      margin-top: 18px;
      padding: 14px;
      border-radius: 6px;
      background: #fff1b8;
      border: 2px solid #7a4b16;
      font-weight: 700;
      line-height: 1.35;
      color: #6a3c16;
    }

    .game-link {
      min-height: 44px;
      margin-top: 14px;
      border: 2px solid #7a4b16;
      border-radius: 6px;
      padding: 0 16px;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
      text-decoration: none;
      background: #fffdf5;
      color: #7a4b16;
    }

    .game-link:hover {
      background: #fff1b8;
    }

    @media (max-width: 420px) {
      main {
        padding: 22px;
        box-shadow: 5px 5px 0 #7a4b16;
      }

      .number-display {
        min-height: 120px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="title-row">
      <h1>One Shot</h1>
      <svg class="target-mark" viewBox="0 0 100 100" role="img" aria-label="Heart target">
        <circle cx="50" cy="50" r="45" fill="#fff8dc" stroke="#7a4b16" stroke-width="5"></circle>
        <circle cx="50" cy="50" r="31" fill="#ffd84d" stroke="#7a4b16" stroke-width="4"></circle>
        <path d="M50 70 C34 58 27 50 27 40 C27 31 37 27 44 34 C47 37 49 39 50 42 C51 39 53 37 56 34 C63 27 73 31 73 40 C73 50 66 58 50 70 Z" fill="#ff8aaa" stroke="#7a4b16" stroke-width="3"></path>
      </svg>
    </div>
    <p>Press the button to generate a random number from 1 to 100. You get exactly one attempt.</p>

    <div class="number-display" id="number-display" aria-live="polite">?</div>
    <button class="generate-button" id="generate-button" type="button">Generate Number</button>

    <div id="result" role="status" aria-live="polite">Ready when you are.</div>
    <a class="game-link" href="matching.html">Start Love Stages</a>
  </main>

  <script>
    const numberDisplay = document.querySelector("#number-display");
    const generateButton = document.querySelector("#generate-button");
    const result = document.querySelector("#result");

    const STORAGE_KEY = "one-shot-number-generator";
    const COOLDOWN_MS = 5 * 60 * 1000;
    let cooldownTimer;

    function randomNumber() {
      return Math.floor(Math.random() * 100) + 1;
    }

    function getSavedAttempt() {
      const savedAttempt = localStorage.getItem(STORAGE_KEY);

      if (!savedAttempt) {
        return null;
      }

      try {
        return JSON.parse(savedAttempt);
      } catch {
        localStorage.removeItem(STORAGE_KEY);
        return null;
      }
    }

    function saveAttempt(number) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        number,
        generatedAt: Date.now()
      }));
    }

    function setReadyState() {
      numberDisplay.textContent = "?";
      generateButton.disabled = false;
      result.textContent = "Ready when you are.";
      generateButton.focus();
    }

    function setCooldownState(savedAttempt) {
      const elapsed = Date.now() - savedAttempt.generatedAt;
      const remaining = COOLDOWN_MS - elapsed;

      if (remaining <= 0) {
        localStorage.removeItem(STORAGE_KEY);
        setReadyState();
        return;
      }

      generateButton.disabled = true;
      numberDisplay.textContent = savedAttempt.number;
      result.textContent = "You already generated a number. Please wait before trying again.";

      clearTimeout(cooldownTimer);
      cooldownTimer = setTimeout(() => {
        setCooldownState(savedAttempt);
      }, 1000);
    }

    function syncGameState() {
      const savedAttempt = getSavedAttempt();

      if (savedAttempt) {
        setCooldownState(savedAttempt);
      } else {
        setReadyState();
      }
    }

    generateButton.addEventListener("click", () => {
      const savedAttempt = getSavedAttempt();

      if (savedAttempt && Date.now() - savedAttempt.generatedAt < COOLDOWN_MS) {
        setCooldownState(savedAttempt);
        return;
      }

      const generatedNumber = randomNumber();
      saveAttempt(generatedNumber);
      setCooldownState({
        number: generatedNumber,
        generatedAt: Date.now()
      });
    });

    syncGameState();
  </script>
</body>
</html>
